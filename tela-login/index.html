<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - ContratAki</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

</head>

<body class="bg-primary bg-gradient min-vh-100 d-flex justify-content-center align-items-center">

    <div class="card shadow-lg border-0 rounded-4 p-4" style="max-width: 500px; width: 100%;">

        <!-- LOGO -->

        <div class="text-center mb-4">

            <h1 class="fw-bold text-primary">
                ContratAki
            </h1>

            <p class="text-secondary mb-0">
                Faça login na plataforma
            </p>

        </div>

        <form>

            <!-- PERFIL -->

<div class="mb-4">

    <label class="form-label fw-semibold">
        Selecione seu perfil
    </label>

    <div class="row g-3">

        <!-- CLIENTE -->

        <div class="col-6">

            <input type="radio" class="btn-check" name="perfil" id="cliente" checked>

            <label for="cliente"
                class="btn btn-outline-primary w-100 rounded-4 py-3 d-flex flex-column align-items-center">

                <i class="bi bi-briefcase fs-3 mb-2"></i>

                <span>
                    Cliente
                </span>

            </label>

        </div>

        <!-- TRABALHADOR -->

        <div class="col-6">

            <input type="radio" class="btn-check" name="perfil" id="trabalhador">

            <label for="trabalhador"
                class="btn btn-outline-primary w-100 rounded-4 py-3 d-flex flex-column align-items-center">

                <i class="bi bi-tools fs-3 mb-2"></i>

                <span>
                    Trabalhador
                </span>

            </label>

        </div>

    </div>

</div>

            <!-- EMAIL -->

            <div class="mb-3">

                <label class="form-label fw-semibold">
                    Email
                </label>

                <div class="input-group">

                    <span class="input-group-text">
                        <i class="bi bi-envelope"></i>
                    </span>

                    <input type="email" class="form-control form-control-lg"
                        placeholder="Digite seu email">

                </div>

            </div>

            <!-- SENHA -->

            <div class="mb-4">

                <label class="form-label fw-semibold">
                    Senha
                </label>

                <div class="input-group">

                    <span class="input-group-text">
                        <i class="bi bi-lock"></i>
                    </span>

                    <input type="password" class="form-control form-control-lg"
                        placeholder="Digite sua senha">

                </div>

            </div>

            <!-- BOTAO -->

            <button type="submit" class="btn btn-primary btn-lg w-100 rounded-4">

                Entrar

            </button>

        </form>

        <!-- CADASTRO -->

        <div class="text-center mt-4">

            <span class="text-secondary">
                Não possui conta?
            </span>

            <a href="#" class="text-decoration-none fw-semibold">
                Cadastre-se
            </a>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
