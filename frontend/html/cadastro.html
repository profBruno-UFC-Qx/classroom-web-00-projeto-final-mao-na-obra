<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tela de Cadastro - ContratAki</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    />

    <style>
      #camposTrabalhador {
        display: none;
      }

      form:has(#trabalhador:checked) #camposTrabalhador {
        display: block;
      }
    </style>
  </head>

  <body
    class="bg-light d-flex align-items-center justify-content-center"
    style="min-height: 100vh"
  >
    <main
      class="bg-white p-4 rounded shadow-sm w-100 my-4"
      style="max-width: 500px"
    >
      <h1 class="text-center text-primary mb-4">Cadastre-se</h1>

      <form>
        <fieldset class="secao-perfil mb-4 border-bottom pb-3">
          <p class="fw-bold mb-3 text-center">Qual será o seu perfil?</p>

          <div class="d-flex justify-content-center gap-2">
            <input
              type="radio"
              name="tipoUsuario"
              id="cliente"
              class="btn-check"
              checked
              required
            />
            <label class="btn btn-outline-primary px-4py-2" for="cliente"
              >Cliente</label
            >

            <input
              type="radio"
              name="tipoUsuario"
              class="btn-check"
              id="trabalhador"
            />
            <label class="btn btn-outline-primary px-4py-2" for="trabalhador"
              >Trabalhador</label
            >
          </div>
        </fieldset>

        <fieldset class="mb-4">
          <legend class="fs-5 fw-semibold mb-3">Dados pessoais</legend>

          <label class="form-label">Nome Completo</label>
          <input
            type="text"
            class="form-control mb-2"
            placeholder="Digite seu nome"
            required
          />

          <label class="form-label">Email</label>
          <input
            type="email"
            class="form-control mb-2"
            placeholder="Digite seu email"
            required
          />

          <label class="form-label">Senha</label>
          <input
            type="password"
            class="form-control mb-2"
            placeholder="Crie uma senha segura"
            minlength="8"
            required
          />

          <label class="form-label">Telefone</label>
          <input
            type="tel"
            class="form-control mb-2"
            placeholder="(00) 00000-0000"
            required
          />

          <label class="form-label">Endereço</label>
          <input
            type="text"
            class="form-control mb-2"
            placeholder="Ex: Centro, Quixadá - CE, nº28"
            required
          />

          <label class="form-label">Complemento</label>
          <input
            type="text"
            class="form-control mb-2"
            placeholder="Apto, Bloco, etc."
          />
        </fieldset>

        <fieldset
          id="camposTrabalhador"
          class="mb-4 p-3 bg-light border rounded"
        >
          <legend class="fs-6 fw-bold text-primary">Perfil Profissional</legend>

          <label class="form-label">Categoria</label>
          <select class="form-select mb-3">
            <option disabled selected>Selecione</option>
            <option>Consertos</option>
            <option>Encanamento</option>
            <option>Limpeza</option>
            <option>Outro</option>
          </select>

          <label class="form-label">Preço (R$)</label>
          <input type="number" class="form-control mb-3" placeholder="0.00" />
        </fieldset>

        <button type="submit" class="btn btn-primary w-100 py-2 fs-5">
          Concluir Cadastro
        </button>

        <div class="text-center mt-3 mb-4">
          <a href="login.html" class="text-decoration-none"
            >Já possui conta? Entrar</a
          >
        </div>
      </form>
    </main>

    <script src="../js/api.js"></script>
    <script src="../js/cadastro.js"></script>
  </body>
</html>
