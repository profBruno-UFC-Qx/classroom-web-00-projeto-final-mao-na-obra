<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> Gestão de Registros</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <!-- <link rel="stylesheet" href="admin.css" /> -->
  </head>

  <body class="bg-light">
    <nav
      class="navbar navbar-expand bg-white border-bottom px-4 py-2 justify-content-between"
    >
      <a
        class="navbar-brand d-flex align-items-center fw-bold text-dark"
        href="#"
      >
        Gerenciamento
      </a>

      <span
        id="iniciaisAdmin"
        class="badge bg-primary rounded-circle d-flex align-items-center justify-content-center"
        style="width: 35px; height: 35px"
      >
      </span>
    </nav>

    <main class="container-fluid px-4 py-4">
      <header class="mb-4">
        <p class="h6 fw-bold">Gestão de Registros</p>
      </header>

      <section class="table-responsive bg-white rounded shadow-sm border">
        <table class="table align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th class="ps-4">Nome</th>
              <th>E-mail</th>
              <th>Tipo</th>
              <th class="text-end pe-4">Ação</th>
            </tr>
          </thead>

          <tbody id="listaUsuarios">
            <!-- As linhas serão adicionadas pelo JavaScript -->
          </tbody>
        </table>
      </section>
    </main>

    <script src="admin.js"></script>
  </body>
</html>
