<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> Gestão de Registros</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <!-- <link rel="stylesheet" href="admin.css" /> -->
  </head>

  <body class="bg-light">
    <nav
      class="navbar navbar-expand bg-white border-bottom px-4 py-2 justify-content-between"
    >
      <a
        class="navbar-brand d-flex align-items-center fw-bold text-dark"
        href="#"
      >
        <i class="bi bi-shield-lock me-2"></i> Painel Admin - ContratAki
      </a>

      <div class="d-flex align-items-center gap-3">
        <span
          id="iniciaisAdmin"
          class="badge bg-primary rounded-circle d-flex align-items-center justify-content-center"
          style="width: 35px; height: 35px"
        >
        </span>
        <button
          id="botaoSair"
          class="btn btn-outline-danger btn-sm"
          type="button"
          aria-label="Sair da conta"
        >
          <i class="bi bi-box-arrow-right"></i> Sair
        </button>
      </div>
    </nav>

    <main class="container-fluid px-4 py-4">
      <header class="mb-4 d-flex justify-content-between align-items-center">
        <p class="h6 fw-bold mb-0">Gestão de Registros</p>
        <button
          id="botaoRecarregar"
          class="btn btn-sm btn-outline-primary"
          type="button"
          aria-label="Recarregar usuários"
        >
          <i class="bi bi-arrow-clockwise"></i> Recarregar
        </button>
      </header>

      <section class="table-responsive bg-white rounded shadow-sm border">
        <table class="table align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th class="ps-4">Nome</th>
              <th>E-mail</th>
              <th>Tipo</th>
              <th class="text-end pe-4">Ação</th>
            </tr>
          </thead>

          <tbody id="listaUsuarios">
            <!-- As linhas serão adicionadas pelo JavaScript -->
          </tbody>
        </table>
      </section>
    </main>

    <script src="../js/api.js"></script>
    <script src="../js/admin.js"></script>
  </body>
</html>
