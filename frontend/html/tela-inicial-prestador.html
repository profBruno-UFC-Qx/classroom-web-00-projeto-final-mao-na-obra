<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ContraAki - Dashboard do Profissional</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="/frontend/css/tela-inicial-prestador.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary py-3">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">ContraAki</a>
    </div>
</nav>

<div class="container py-5">
    <!-- Saudação -->
    <div class="mb-4">
        <h2 class="fw-bold">Olá, Profissional! 👋</h2>
        <p class="text-secondary">Aqui está o resumo das suas atividades hoje.</p>
    </div>

    <!-- Cards de Resumo -->
    <div class="row g-4 mb-5">
        <div class="col-md-3">
            <div class="card card-home p-4">
                <p class="text-secondary mb-1">Ganhos no mês</p>
                <h3 class="fw-bold text-primary">R$ 2.450</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card card-home p-4">
                <p class="text-secondary mb-1">Serviços ativos</p>
                <h3 class="fw-bold">3</h3>
            </div>
        </div>

    </div>

    <!-- Ações Rápidas -->
    <h5 class="fw-bold mb-3">Ações Rápidas</h5>
    <div class="row g-3 mb-5">
        <div class="col-md-3">
            <button class="btn btn-primary w-100 btn-action">Ver Agenda</button>
        </div>
        <div class="col-md-3">
            <button class="btn btn-success w-100 btn-action">Novo Serviço</button>
        </div>

    </div>

    <!-- Próximo Compromisso -->
    <h5 class="fw-bold mb-3">Próximo compromisso</h5>
    <div class="card card-home p-4">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h5 class="fw-bold">Manutenção de Ar-condicionado</h5>
                <p class="text-secondary mb-0">Cliente: Carlos Silva • Hoje, 15:30</p>
            </div>
            <button class="btn btn-outline-primary">Ver Detalhes</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
